<!doctype html>
<html lang="cs"><head><meta charset="utf-8"><title>Mail</title>
<style>body{font-family:-apple-system,Helvetica,Arial,sans-serif;margin:24px}
table{border-collapse:collapse}td,th{border:1px solid #ddd;padding:4px 8px;text-align:left;vertical-align:top}
th{background:#f5f5f5}</style></head><body>
<h1>Mail ({{ messages.len() }})</h1>
<table>
<tr><th>Datum</th><th>Od</th><th>Komu</th><th>Předmět</th><th>Úryvek</th></tr>
{% for m in messages %}
<tr><td>{% if let Some(d) = m.date %}{{ d }}{% endif %}</td>
<td>{{ m.from }}</td><td>{{ m.to }}</td><td>{{ m.subject }}</td><td>{{ m.snippet }}</td></tr>
{% endfor %}
</table>
</body></html>
