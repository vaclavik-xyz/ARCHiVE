<!doctype html>
<html lang="cs"><head><meta charset="utf-8"><title>Uložená hesla</title>
<style>body{font-family:-apple-system,Helvetica,Arial,sans-serif;margin:24px}
table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:4px 8px;text-align:left}
th{background:#f5f5f5}code{background:#f0f0f0;padding:1px 5px;border-radius:3px}
.warn{background:#ffebee;border:1px solid #ef9a9a;padding:8px 12px;border-radius:6px;margin-bottom:16px}</style></head><body>
<h1>Uložená hesla webů a aplikací ({{ logins.len() }})</h1>
<p class="warn">🔒 Citlivé. Hesla jsou v otevřené podobě. Předávej jen vlastníkovi zařízení a bezpečným kanálem.</p>
<table>
<tr><th>Služba / web</th><th>Účet</th><th>Heslo</th><th>Protokol</th></tr>
{% for p in logins %}
<tr><td>{{ p.service }}</td><td>{{ p.account }}</td><td><code>{{ p.password }}</code></td><td>{{ p.protocol }}</td></tr>
{% endfor %}
</table>
</body></html>
