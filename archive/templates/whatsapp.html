<!doctype html>
<html lang="cs"><head><meta charset="utf-8"><title>WhatsApp</title>
<style>body{font-family:-apple-system,Helvetica,Arial,sans-serif;margin:24px}
table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:4px 8px;text-align:left;vertical-align:top}
th{background:#f5f5f5}td.me{background:#e7ffe7}img{max-width:200px;max-height:200px;display:block}</style></head><body>
<h1>WhatsApp ({{ messages.len() }})</h1>
<table>
<tr><th>Datum</th><th>Chat</th><th>Odesílatel</th><th>Zpráva</th><th>Média</th></tr>
{% for m in messages %}
<tr>
<td>{{ m.date }}</td><td>{{ m.chat }}</td>
<td{% if m.from_me %} class="me"{% endif %}>{% if m.from_me %}já{% else %}{{ m.sender }}{% endif %}</td>
<td>{{ m.text }}</td>
<td>{% if let Some(f) = m.media_file.as_ref() %}{% if m.is_image() %}<a href="{{ f }}"><img src="{{ f }}" loading="lazy"></a>{% else %}<a href="{{ f }}">{{ f }}</a>{% endif %}{% endif %}</td>
</tr>
{% endfor %}
</table>
</body></html>
