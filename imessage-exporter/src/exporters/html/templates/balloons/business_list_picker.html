<div class="list-picker">{% if let Some(summary) = summary.get() %}<div class="list-picker-summary">{{ summary }}</div>{% endif %}<ul class="list-picker-items">{% for item in items %}<li class="list-picker-item{% if item.selected %} selected{% endif %}">{{ item.title }}{% if let Some(subtitle) = item.subtitle.get() %} <span class="list-picker-subtitle">{{ subtitle }}</span>{% endif %}</li>{% endfor %}</ul></div>
